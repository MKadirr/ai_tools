<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Quiz</title>
<style>
  :root{
    --bg: #faf9f6;
    --card-bg: #ffffff;
    --text: #1f2430;
    --muted: #6b7280;
    --border: #e3e1da;
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --correct: #16a34a;
    --correct-bg: #ecfdf3;
    --incorrect: #dc2626;
    --incorrect-bg: #fef2f2;
  }

  [data-theme="dark"]{
    --bg: #15171c;
    --card-bg: #1e2128;
    --text: #e8e7e3;
    --muted: #9499a3;
    --border: #34373f;
    --accent: #6366f1;
    --accent-light: #262a40;
    --correct: #4ade80;
    --correct-bg: #16261d;
    --incorrect: #f87171;
    --incorrect-bg: #2b1a1a;
  }

  body, .btn, label.file-label, .filename-input, input, select, textarea, .q-card,
  .quiz-question, .order-item, .order-move, .order-controls button, .theme-toggle{
    transition: background-color .15s ease, border-color .15s ease, color .15s ease;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.45;
  }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  h1{
    font-size: 1.5rem;
    margin: 0 0 4px;
  }

  .page-header{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .theme-toggle{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 38px;
    height: 38px;
    font-size: 1.05rem;
    line-height: 1;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }
  .theme-toggle:hover{ border-color: var(--accent); }

  h2{
    font-size: 1.05rem;
    margin: 28px 0 12px;
  }

  p.subtitle{
    color: var(--muted);
    margin: 0 0 24px;
    font-size: .92rem;
  }

  nav.tabs{
    display:flex;
    gap:8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  nav.tabs button{
    background: none;
    border: none;
    padding: 10px 4px;
    margin-right: 16px;
    font-size: .95rem;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }

  nav.tabs button.active{
    color: var(--text);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  button{
    font-family: inherit;
  }

  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  label.file-label:focus-within{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .btn{
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: .9rem;
    cursor: pointer;
  }

  .btn:hover{ opacity: .92; }

  .btn.secondary:hover, .btn.ghost:hover{
    border-color: var(--accent);
    color: var(--accent);
    opacity: 1;
  }

  .btn.secondary{
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn.ghost{
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn.danger{
    background: none;
    border: 1px solid var(--incorrect);
    color: var(--incorrect);
  }

  .btn.small{
    padding: 5px 10px;
    font-size: .8rem;
    border-radius: 6px;
  }

  .toolbar{
    display:flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  label.file-label{
    display:inline-flex;
    align-items:center;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 16px;
    font-size: .9rem;
    cursor: pointer;
  }
  label.file-label:hover{ border-color: var(--accent); }

  .filename-input{
    width: 180px;
    margin-top: 0;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    background: var(--card-bg);
    color: var(--text);
  }

  form#question-form{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  form#question-form label{
    display:block;
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 14px;
  }

  input[type="text"], input[type="number"], select, textarea{
    display:block;
    width: 100%;
    margin-top: 6px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: .92rem;
    color: var(--text);
    background: var(--card-bg);
    font-family: inherit;
  }

  textarea{ resize: vertical; }

  #q-text, #q-explanation{
    resize: none;
    overflow: hidden;
  }

  .choice-row, .answer-row, .pool-option-row{
    display:flex;
    align-items:center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .choice-row input[type="text"], .answer-row input[type="text"], .pool-option-row input[type="text"]{
    margin-top:0;
    flex: 1;
  }

  .choice-row input[type="radio"], .choice-row input[type="checkbox"]{
    flex-shrink: 0;
    width: 17px;
    height: 17px;
  }

  .remove-row{
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    flex-shrink: 0;
  }
  .remove-row:hover{ color: var(--incorrect); }

  .add-row-btn{
    background: none;
    border: 1px dashed var(--border);
    color: var(--accent);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: .85rem;
    cursor: pointer;
    margin-top: 2px;
  }

  .add-row-btn.small{
    padding: 5px 9px;
    font-size: .78rem;
  }

  .case-sensitive-row{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: .85rem;
    color: var(--text);
    margin-top: 4px;
  }
  .case-sensitive-row input{ width:16px; height:16px; }

  .form-actions{
    display:flex;
    gap: 10px;
    margin-top: 18px;
  }

  .cards{
    display:flex;
    flex-direction: column;
    gap: 10px;
  }

  .q-card{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: background-color .3s ease, border-color .3s ease;
  }

  .q-card.is-highlighted{
    background: var(--accent-light);
    border-color: var(--accent);
  }

  .q-card-head{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .q-card-head p.q-title{
    margin: 0;
    font-weight: 600;
    font-size: .95rem;
    white-space: pre-wrap;
  }

  .q-card .q-type-tag{
    display:inline-block;
    font-size: .72rem;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 999px;
    margin-top: 6px;
  }

  .q-card ul{
    margin: 10px 0 0;
    padding-left: 18px;
    font-size: .85rem;
    color: var(--muted);
  }

  .q-card ul li.is-right{
    color: var(--correct);
    font-weight: 600;
  }

  .q-card p.q-meta{
    font-size: .82rem;
    color: var(--muted);
    margin: 8px 0 0;
    white-space: pre-wrap;
  }

  .q-card-actions{
    display:flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .empty-state{
    color: var(--muted);
    font-size: .9rem;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 22px;
    text-align: center;
  }

  /* --- Édition : texte à trous --- */

  .trou-hint{
    font-size: .8rem;
    color: var(--muted);
    margin: 4px 0 10px;
  }

  .pool-toggle-label{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: .85rem;
    color: var(--text);
    margin: 2px 0 10px;
  }
  .pool-toggle-label input{ width:16px; height:16px; flex-shrink:0; }

  #pool-container{
    margin-bottom: 8px;
  }

  #pool-add-btn{
    margin-bottom: 16px;
  }

  .trou-row{
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .trou-row .trou-label{
    display:block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .trou-row-body select{
    margin-top: 0;
  }

  .trou-cs-label{
    display:flex;
    align-items:center;
    gap: 6px;
    font-size: .8rem;
    color: var(--text);
    margin-top: 4px;
  }
  .trou-cs-label input{ width:16px; height:16px; }

  /* --- Édition : ordre --- */

  .order-row{
    display:flex;
    align-items:center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .order-row input[type="text"]{
    margin-top: 0;
    flex: 1;
  }

  .order-move{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    color: var(--muted);
    cursor: pointer;
    flex-shrink: 0;
  }
  .order-move:hover{ border-color: var(--accent); color: var(--accent); }

  /* --- Mode lancer --- */

  #play-intro{
    text-align:center;
    padding: 40px 0;
  }

  .play-config-row{
    display:flex;
    justify-content:center;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .quiz-count-label{
    display:block;
    font-size: .85rem;
    color: var(--muted);
  }

  .quiz-count-label input{
    display:block;
    margin: 8px auto 0;
    width: 100px;
    text-align: center;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: .95rem;
    color: var(--text);
  }

  .seed-input-row{
    display:flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
  }

  .seed-input-row input{
    width: 110px;
    text-align: center;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: .95rem;
    color: var(--text);
    background: var(--card-bg);
  }

  #seed-random-btn{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    width: 38px;
    font-size: 1.05rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  #seed-random-btn:hover{ border-color: var(--accent); }

  #quiz-active-bar{
    display:flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: .85rem;
    color: var(--muted);
  }

  #quiz-seed-display{
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  .score-banner{
    background: var(--accent-light);
    border-radius: 12px;
    padding: 18px 20px;
    text-align: center;
    margin-bottom: 24px;
  }
  .score-banner .score-num{
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
  }

  .score-banner .time-info{
    font-size: .82rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .quiz-question{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }

  .quiz-question.is-correct{
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .quiz-question.is-incorrect{
    border-color: var(--incorrect);
    background: var(--incorrect-bg);
  }

  .quiz-question p.q-number{
    margin: 0 0 4px;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .03em;
    color: var(--muted);
  }

  .quiz-question p.q-text{
    margin: 0 0 12px;
    font-weight: 600;
    white-space: pre-wrap;
  }

  .quiz-option{
    display:flex;
    align-items:center;
    gap: 9px;
    padding: 7px 0;
    font-size: .92rem;
  }

  .quiz-option input{
    width: 17px;
    height: 17px;
    flex-shrink: 0;
  }

  .quiz-question input[type="text"]{
    margin-top: 0;
  }

  p.feedback{
    margin: 10px 0 0;
    font-size: .85rem;
    font-weight: 600;
  }
  .is-correct p.feedback{ color: var(--correct); }
  .is-incorrect p.feedback{ color: var(--incorrect); }

  /* inputs désactivés après validation — forcer les couleurs pour le dark mode */
  .quiz-question input:disabled,
  .quiz-question select:disabled,
  .quiz-question textarea:disabled{
    opacity: 1;
    color: var(--text);
    background: var(--card-bg);
    border-color: var(--border);
    -webkit-text-fill-color: var(--text);
  }

  .quiz-question.is-correct input:disabled,
  .quiz-question.is-correct select:disabled{
    background: var(--correct-bg);
  }

  .quiz-question.is-incorrect input:disabled,
  .quiz-question.is-incorrect select:disabled{
    background: var(--incorrect-bg);
  }

  p.explanation{
    margin: 6px 0 0;
    font-size: .85rem;
    color: var(--muted);
    font-style: italic;
    white-space: pre-wrap;
  }

  /* --- Quiz : texte à trous --- */

  p.trou-render{
    margin: 0;
    line-height: 2.3;
  }

  .trou-input{
    display: inline-block;
    width: auto;
    min-width: 110px;
    margin: 0 3px;
    padding: 3px 7px;
    font-size: .92rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    vertical-align: middle;
  }

  /* --- Quiz : ordre --- */

  .order-list{
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .order-item{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    margin-bottom: 8px;
    font-size: .92rem;
  }

  .order-controls{
    display:flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .order-controls button{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    color: var(--muted);
    cursor: pointer;
  }
  .order-controls button:hover{ border-color: var(--accent); color: var(--accent); }
  .order-controls button:disabled{ opacity: .4; cursor: default; }

  #validate-btn{
    width: 100%;
    padding: 12px;
    font-size: .95rem;
    margin-top: 6px;
  }

  [hidden]{ display: none !important; }

  /* --- Onglet Score --- */

  .score-columns{
    display:flex;
    gap: 32px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .score-column{
    flex: 1;
    min-width: 260px;
  }

  .bubble-grid{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .score-bubble{
    width: 52px;
    height: 52px;
    border-radius: 10px;
    border: 1px solid var(--border);
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    cursor: pointer;
    font-size: .68rem;
    line-height: 1.3;
    color: var(--text);
    background: var(--card-bg);
    flex-shrink: 0;
  }
  .score-bubble:hover{ border-color: var(--accent); transform: translateY(-1px); }

  .score-bubble .bubble-num{
    font-weight: 700;
    font-size: .74rem;
  }

  .score-bubble.is-untested{
    background: var(--card-bg);
    color: var(--muted);
  }

  .run-list{
    display:flex;
    flex-direction: column;
    gap: 8px;
  }

  .run-bubble{
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display:flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-size: .85rem;
    background: var(--card-bg);
  }

  .run-bubble.is-obsolete{
    opacity: .5;
  }

  .run-bubble .run-score{
    font-weight: 700;
  }

  .run-bubble .run-meta{
    font-size: .78rem;
    color: var(--muted);
    text-align: right;
  }

  /* --- Onglet JSON --- */

  .json-toolbar{
    display:flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  #json-editor{
    width: 100%;
    min-height: 460px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: .82rem;
    line-height: 1.6;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--text);
    resize: vertical;
    tab-size: 2;
  }

  .json-error{
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--incorrect-bg);
    color: var(--incorrect);
    font-size: .85rem;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="page-header">
    <div>
      <h1>Mini Quiz</h1>
      <p class="subtitle">Éditez vos questions puis lancez le quiz.</p>
    </div>
    <button type="button" id="theme-toggle" class="theme-toggle" title="Changer de thème" aria-label="Changer de thème">🌙</button>
  </div>

  <nav class="tabs">
    <button type="button" id="btn-nav-edit" class="active">Éditer</button>
    <button type="button" id="btn-nav-play">Lancer</button>
    <button type="button" id="btn-nav-score">Score</button>
    <button type="button" id="btn-nav-json">JSON</button>
  </nav>

  <!-- ===================== VUE EDITION ===================== -->
  <section id="view-edit">

    <div class="toolbar">
      <label class="file-label" tabindex="0">
        Charger un JSON
        <input type="file" id="file-input" accept="application/json" hidden>
      </label>
      <button type="button" class="btn secondary" id="export-btn">Exporter le JSON</button>
      <input type="text" id="export-filename" class="filename-input" placeholder="questions.json">
    </div>

    <form id="question-form">
      <h2 id="form-title" style="margin-top:0;">Ajouter une question</h2>

      <label>Intitulé de la question
        <textarea id="q-text" rows="2" required placeholder="Ex : Quelle est la capitale de la France ?"></textarea>
      </label>

      <label>Type de question
        <select id="q-type">
          <option value="qcm_simple">Choix multiple — une seule réponse</option>
          <option value="qcm_multiple">Choix multiple — plusieurs réponses</option>
          <option value="texte_libre">Réponse libre (texte)</option>
          <option value="texte_a_trous">Texte à trous</option>
          <option value="ordre">Remettre dans l'ordre</option>
        </select>
      </label>

      <div id="q-fields"></div>

      <label>Message d'explication (optionnel)
        <textarea id="q-explanation" rows="2" placeholder="Affiché après la correction, ex : un complément d'info ou une source."></textarea>
      </label>

      <div class="form-actions">
        <button type="submit" class="btn" id="submit-btn">Ajouter la question</button>
        <button type="button" class="btn ghost" id="cancel-edit-btn" hidden>Annuler</button>
      </div>
    </form>

    <h2>Questions (<span id="question-count">0</span>)</h2>
    <div id="questions-list" class="cards"></div>
  </section>

  <!-- ===================== VUE LANCER ===================== -->
  <section id="view-play" hidden>

    <div id="play-intro">
      <div class="play-config-row">
        <label class="quiz-count-label">Nombre de questions à tirer
          <input type="number" id="quiz-count-input" min="1">
        </label>
        <label class="quiz-count-label">Seed (optionnel)
          <div class="seed-input-row">
            <input type="number" id="quiz-seed-input" placeholder="aléatoire">
            <button type="button" id="seed-random-btn" title="Générer une seed aléatoire" aria-label="Générer une seed aléatoire">🎲</button>
          </div>
        </label>
      </div>
      <button type="button" class="btn" id="start-quiz-btn">Lancer le quiz</button>
    </div>

    <div id="quiz-active-bar" hidden>
      <span id="quiz-seed-display"></span>
      <button type="button" class="btn ghost small" id="regenerate-btn">🔄 Régénérer</button>
    </div>

    <div id="quiz-result" hidden></div>

    <form id="quiz-form" hidden>
      <div id="quiz-questions"></div>
      <button type="submit" class="btn" id="validate-btn">Valider</button>
    </form>

  </section>

  <!-- ===================== VUE SCORE ===================== -->
  <section id="view-score" hidden>
    <div class="score-columns">
      <div class="score-column">
        <h2 style="margin-top:0;">Questions</h2>
        <p class="subtitle" id="score-questions-empty">Aucune question pour l'instant.</p>
        <div id="score-questions-bubbles" class="bubble-grid"></div>

      <div class="score-column">
        <h2 style="margin-top:0;">Historique des quiz</h2>
        <p class="subtitle" id="score-runs-empty">Aucun quiz validé pour l'instant.</p>
        <div id="score-runs-list" class="run-list"></div>

  <!-- ===================== VUE JSON ===================== -->
  <section id="view-json" hidden>
    <p class="subtitle" style="margin-bottom:12px;">Éditez le JSON directement. Cliquez sur "Appliquer" pour charger les modifications.</p>
    <div class="json-toolbar">
      <button type="button" class="btn secondary" id="json-refresh-btn">↺ Rafraîchir</button>
      <button type="button" class="btn" id="json-apply-btn">Appliquer</button>
    </div>
    <textarea id="json-editor" spellcheck="false"></textarea>
    <p id="json-error" class="json-error" hidden></p>
  </section>

</div>

<script>
(function(){

  /* ---------------------------------------------------------------
     ETAT
  --------------------------------------------------------------- */
  let questions = [];      // questions actuellement chargées/éditées
  let editingIndex = null; // index en cours d'édition, ou null
  let runtimeQuestions = []; // copie mélangée utilisée pendant le quiz
  let lastTrouMode = null; // mode ('libre'/'menu_deroulant') du dernier rendu des trous, pour préserver les valeurs
  let lastTrouPoolPartage = false; // pool partagé ou non lors du dernier rendu des trous
  let quizStartTime = null; // horodatage de lancement du quiz, pour le chronomètre
  let currentSeed = null; // seed utilisée pour le quiz en cours
  let quizRuns = []; // historique des runs validés : { score, total, seed, tempsMs, obsolete }
  let questionStats = []; // stats par index de question : { reussites, passages, obsolete }

  /* ---------------------------------------------------------------
     ELEMENTS
  --------------------------------------------------------------- */
  const navEditBtn = document.getElementById('btn-nav-edit');
  const navPlayBtn = document.getElementById('btn-nav-play');
  const navScoreBtn = document.getElementById('btn-nav-score');
  const navJsonBtn = document.getElementById('btn-nav-json');
  const viewEdit = document.getElementById('view-edit');
  const viewPlay = document.getElementById('view-play');
  const viewScore = document.getElementById('view-score');
  const viewJson = document.getElementById('view-json');
  const themeToggleBtn = document.getElementById('theme-toggle');

  const jsonEditor = document.getElementById('json-editor');
  const jsonRefreshBtn = document.getElementById('json-refresh-btn');
  const jsonApplyBtn = document.getElementById('json-apply-btn');
  const jsonError = document.getElementById('json-error');

  const fileInput = document.getElementById('file-input');
  const exportBtn = document.getElementById('export-btn');
  const exportFilenameInput = document.getElementById('export-filename');

  const form = document.getElementById('question-form');
  const formTitle = document.getElementById('form-title');
  const qTextInput = document.getElementById('q-text');
  const qTypeSelect = document.getElementById('q-type');
  const qFields = document.getElementById('q-fields');
  const qExplanationInput = document.getElementById('q-explanation');
  const submitBtn = document.getElementById('submit-btn');
  const cancelEditBtn = document.getElementById('cancel-edit-btn');

  const questionsList = document.getElementById('questions-list');
  const questionCount = document.getElementById('question-count');

  const playIntro = document.getElementById('play-intro');
  const quizCountInput = document.getElementById('quiz-count-input');
  const quizSeedInput = document.getElementById('quiz-seed-input');
  const seedRandomBtn = document.getElementById('seed-random-btn');
  const startQuizBtn = document.getElementById('start-quiz-btn');
  const quizActiveBar = document.getElementById('quiz-active-bar');
  const quizSeedDisplay = document.getElementById('quiz-seed-display');
  const regenerateBtn = document.getElementById('regenerate-btn');
  const quizForm = document.getElementById('quiz-form');
  const quizQuestions = document.getElementById('quiz-questions');
  const quizResult = document.getElementById('quiz-result');
  const validateBtn = document.getElementById('validate-btn');

  const scoreQuestionsBubbles = document.getElementById('score-questions-bubbles');
  const scoreQuestionsEmpty = document.getElementById('score-questions-empty');
  const scoreRunsList = document.getElementById('score-runs-list');
  const scoreRunsEmpty = document.getElementById('score-runs-empty');

  /* ---------------------------------------------------------------
     NAVIGATION ENTRE LES VUES
  --------------------------------------------------------------- */
  function showView(name){
    viewEdit.hidden = name !== 'edit';
    viewPlay.hidden = name !== 'play';
    viewScore.hidden = name !== 'score';
    viewJson.hidden  = name !== 'json';
    navEditBtn.classList.toggle('active', name === 'edit');
    navPlayBtn.classList.toggle('active', name === 'play');
    navScoreBtn.classList.toggle('active', name === 'score');
    navJsonBtn.classList.toggle('active', name === 'json');
    if(name === 'json') refreshJsonEditor();
    if(name === 'score') renderScoreTab();
  }
  navEditBtn.addEventListener('click', () => showView('edit'));
  navPlayBtn.addEventListener('click', () => showView('play'));
  navScoreBtn.addEventListener('click', () => showView('score'));
  navJsonBtn.addEventListener('click', () => showView('json'));

  /* ---------------------------------------------------------------
     THEME CLAIR / SOMBRE
  --------------------------------------------------------------- */
  function applyTheme(theme){
    if(theme === 'dark'){
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggleBtn.textContent = '☀️';
      themeToggleBtn.title = 'Passer au thème clair';
    } else {
      document.documentElement.removeAttribute('data-theme');
      themeToggleBtn.textContent = '🌙';
      themeToggleBtn.title = 'Passer au thème sombre';
    }
  }

  function getInitialTheme(){
    try{
      const saved = localStorage.getItem('mini-quiz-theme');
      if(saved === 'dark' || saved === 'light') return saved;
    } catch(e){ /* localStorage indisponible, on ignore */ }
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }

  let currentTheme = getInitialTheme();
  applyTheme(currentTheme);

  themeToggleBtn.addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme(currentTheme);
    try{ localStorage.setItem('mini-quiz-theme', currentTheme); } catch(e){ /* tant pis, pas mémorisé */ }
  });

  /* ---------------------------------------------------------------
     UTILITAIRES
  --------------------------------------------------------------- */

  // Générateur pseudo-aléatoire à seed (mulberry32). Fiable pour mélanger
  // jusqu'à quelques centaines d'éléments — largement suffisant ici.
  function createRng(seed){
    let a = seed >>> 0;
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffle(arr, rng){
    const rand = rng || Math.random;
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function autoResizeTextarea(el){
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // Toute modification de la banque de questions (ajout, édition, suppression,
  // import JSON) invalide l'historique des runs : ces données restent
  // affichées (à titre de souvenir) mais grisées comme "obsolètes". Les
  // runs ne sont pas indexés par position de question, donc pas de risque
  // de décalage.
  function invalidateRuns(){
    quizRuns.forEach(r => { r.obsolete = true; });
  }

  // Les stats par question sont indexées par position dans `questions`.
  // Cet index n'est pas stable dès qu'on ajoute/supprime une question
  // ailleurs qu'en toute fin de liste (tout se décale) : essayer de
  // préserver les anciens compteurs par position mènerait à attribuer le
  // score d'une question à une autre. On repart donc franc à zéro pour
  // toutes les questions à chaque modification.
  function resetQuestionStats(){
    questionStats = questions.map(() => ({ reussites: 0, passages: 0, obsolete: false }));
  }

  // Le quiz affiché à l'écran référence les anciennes questions (énoncés,
  // bonnes réponses...) : dès que la banque change, ce quiz n'a plus de
  // sens et pourrait être validé avec des données obsolètes. On le vide
  // entièrement et on revient à l'écran de configuration.
  function clearActiveQuiz(){
    runtimeQuestions = [];
    currentSeed = null;
    quizStartTime = null;
    quizQuestions.innerHTML = '';
    quizForm.hidden = true;
    quizResult.hidden = true;
    quizResult.innerHTML = '';
    quizActiveBar.hidden = true;
    playIntro.hidden = false;
    validateBtn.hidden = false;
    validateBtn.textContent = 'Valider';
  }

  function formatDuration(ms){
    const totalSeconds = Math.max(0, Math.round(ms / 1000));
    const min = Math.floor(totalSeconds / 60);
    const sec = totalSeconds % 60;
    if(min === 0) return `${sec} s`;
    return `${min} min ${String(sec).padStart(2, '0')} s`;
  }

  qTextInput.addEventListener('input', () => autoResizeTextarea(qTextInput));
  qExplanationInput.addEventListener('input', () => autoResizeTextarea(qExplanationInput));

  const TYPE_LABELS = {
    qcm_simple: 'Choix multiple — une réponse',
    qcm_multiple: 'Choix multiple — plusieurs réponses',
    texte_libre: 'Réponse libre',
    texte_a_trous: 'Texte à trous',
    ordre: 'Remettre dans l\'ordre'
  };

  /* ---------------------------------------------------------------
     FORMULAIRE — CHAMPS DYNAMIQUES SELON LE TYPE
  --------------------------------------------------------------- */
  function buildChoiceRow(text, correct, multiple, groupName){
    const row = document.createElement('div');
    row.className = 'choice-row';

    const correctInput = document.createElement('input');
    correctInput.type = multiple ? 'checkbox' : 'radio';
    correctInput.name = groupName || 'choice-correct';
    correctInput.className = 'choice-correct';
    correctInput.checked = !!correct;
    correctInput.title = 'Marquer comme bonne réponse';

    const textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.className = 'choice-text';
    textInput.placeholder = 'Texte du choix';
    textInput.value = text || '';

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'remove-row';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => row.remove());

    row.append(correctInput, textInput, removeBtn);
    return row;
  }

  function buildAnswerRow(text){
    const row = document.createElement('div');
    row.className = 'answer-row';

    const textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.className = 'answer-text';
    textInput.placeholder = 'Réponse acceptée';
    textInput.value = text || '';

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'remove-row';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => row.remove());

    row.append(textInput, removeBtn);
    return row;
  }

  function buildPoolOptionRow(text){
    const row = document.createElement('div');
    row.className = 'pool-option-row';

    const textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.className = 'pool-option-text';
    textInput.placeholder = 'Option du pool';
    textInput.value = text || '';
    textInput.addEventListener('input', refreshPoolSelects);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'remove-row';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => { row.remove(); refreshPoolSelects(); });

    row.append(textInput, removeBtn);
    return row;
  }

  function getCurrentPoolOptions(){
    const container = document.getElementById('pool-container');
    if(!container) return [];
    return [...container.querySelectorAll('.pool-option-text')]
      .map(i => i.value.trim())
      .filter(v => v !== '');
  }

  function refreshPoolSelects(){
    const pool = getCurrentPoolOptions();
    document.querySelectorAll('.trou-pool-select').forEach(sel => {
      const desired = sel.dataset.preselect !== undefined ? sel.dataset.preselect : sel.value;
      sel.innerHTML = '<option value="">—</option>' + pool.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');
      if(pool.includes(desired)) sel.value = desired;
      delete sel.dataset.preselect;
    });
  }

  function extractTrouIds(texte){
    const ids = new Set();
    const regex = /\{\{(\d+)\}\}/g;
    let m;
    while((m = regex.exec(texte)) !== null){ ids.add(Number(m[1])); }
    return [...ids].sort((a, b) => a - b);
  }

  function buildTrouRow(id, mode, poolPartage, values){
    values = values || {};
    const row = document.createElement('div');
    row.className = 'trou-row';
    row.dataset.id = id;

    const label = document.createElement('span');
    label.className = 'trou-label';
    label.textContent = `{{${id}}}`;
    row.appendChild(label);

    const body = document.createElement('div');
    body.className = 'trou-row-body';

    if(mode === 'libre'){
      const answersContainer = document.createElement('div');
      answersContainer.className = 'trou-answers-container';
      const reponses = values.reponses && values.reponses.length ? values.reponses : [''];
      reponses.forEach(r => answersContainer.appendChild(buildAnswerRow(r)));

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'add-row-btn small';
      addBtn.textContent = '+ Réponse acceptée';
      addBtn.addEventListener('click', () => answersContainer.appendChild(buildAnswerRow('')));

      const csLabel = document.createElement('label');
      csLabel.className = 'trou-cs-label';
      const csInput = document.createElement('input');
      csInput.type = 'checkbox';
      csInput.className = 'trou-cs';
      csInput.checked = !!values.caseSensitive;
      csLabel.append(csInput, document.createTextNode('Sensible à la casse'));

      body.append(answersContainer, addBtn, csLabel);

    } else if(poolPartage){
      const select = document.createElement('select');
      select.className = 'trou-pool-select';
      if(values.reponse) select.dataset.preselect = values.reponse;
      body.appendChild(select);

    } else {
      const optionsContainer = document.createElement('div');
      optionsContainer.className = 'trou-options-container';
      const groupName = `trou-correct-${id}`;
      const opts = values.options && values.options.length ? values.options : ['', ''];
      opts.forEach(opt => optionsContainer.appendChild(buildChoiceRow(opt, opt !== '' && opt === values.reponse, false, groupName)));

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'add-row-btn small';
      addBtn.textContent = '+ Option';
      addBtn.addEventListener('click', () => optionsContainer.appendChild(buildChoiceRow('', false, false, groupName)));

      body.append(optionsContainer, addBtn);
    }

    row.appendChild(body);
    return row;
  }

  function readTrouRowValues(row, mode, poolPartage){
    if(mode === 'libre'){
      const reponses = [...row.querySelectorAll('.trou-answers-container .answer-text')]
        .map(i => i.value.trim()).filter(v => v !== '');
      const caseSensitive = row.querySelector('.trou-cs').checked;
      return { reponses, caseSensitive };
    }
    if(poolPartage){
      const select = row.querySelector('.trou-pool-select');
      return { reponse: select ? select.value : '' };
    }
    const optRows = [...row.querySelectorAll('.trou-options-container .choice-row')];
    const options = optRows.map(r => r.querySelector('.choice-text').value.trim()).filter(v => v !== '');
    const correctRow = optRows.find(r => r.querySelector('.choice-correct').checked);
    const reponse = correctRow ? correctRow.querySelector('.choice-text').value.trim() : '';
    return { options, reponse };
  }

  function syncTrousContainer(preserve){
    const texteInput = document.getElementById('trou-texte');
    const modeSelect = document.getElementById('trou-mode');
    const poolCheckbox = document.getElementById('trou-pool-partage');
    const container = document.getElementById('trous-container');
    if(!texteInput || !modeSelect || !container) return;
    const mode = modeSelect.value;
    const poolPartage = mode === 'menu_deroulant' && !!(poolCheckbox && poolCheckbox.checked);

    let existingMap = {};
    if(preserve && lastTrouMode === mode && lastTrouPoolPartage === poolPartage){
      container.querySelectorAll('.trou-row').forEach(row => {
        existingMap[row.dataset.id] = readTrouRowValues(row, mode, poolPartage);
      });
    }

    const ids = extractTrouIds(texteInput.value);
    container.innerHTML = '';
    if(ids.length === 0){
      const hint = document.createElement('p');
      hint.className = 'trou-hint';
      hint.textContent = 'Ajoutez {{1}}, {{2}}, ... dans le texte ci-dessus pour créer des trous.';
      container.appendChild(hint);
    } else {
      ids.forEach(id => container.appendChild(buildTrouRow(id, mode, poolPartage, existingMap[id])));
    }
    lastTrouMode = mode;
    lastTrouPoolPartage = poolPartage;
    refreshPoolSelects();
  }

  function buildOrderRow(text){
    const row = document.createElement('div');
    row.className = 'order-row';

    const upBtn = document.createElement('button');
    upBtn.type = 'button';
    upBtn.className = 'order-move';
    upBtn.textContent = '▲';
    upBtn.title = 'Monter';
    upBtn.addEventListener('click', () => {
      const prev = row.previousElementSibling;
      if(prev) row.parentNode.insertBefore(row, prev);
    });

    const downBtn = document.createElement('button');
    downBtn.type = 'button';
    downBtn.className = 'order-move';
    downBtn.textContent = '▼';
    downBtn.title = 'Descendre';
    downBtn.addEventListener('click', () => {
      const next = row.nextElementSibling;
      if(next) row.parentNode.insertBefore(next, row);
    });

    const textInput = document.createElement('input');
    textInput.type = 'text';
    textInput.className = 'order-text';
    textInput.placeholder = 'Élément';
    textInput.value = text || '';

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'remove-row';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => row.remove());

    row.append(upBtn, downBtn, textInput, removeBtn);
    return row;
  }

  function renderQFields(type, data){
    data = data || {};
    qFields.innerHTML = '';

    if(type === 'qcm_simple' || type === 'qcm_multiple'){
      const multiple = type === 'qcm_multiple';

      const container = document.createElement('div');
      container.id = 'choices-container';

      const choix = data.choix && data.choix.length ? data.choix : ['', ''];
      const correctSet = multiple
        ? new Set(data.reponses || [])
        : new Set(data.reponse !== undefined ? [data.reponse] : []);

      choix.forEach((c, i) => container.appendChild(buildChoiceRow(c, correctSet.has(i), multiple)));

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'add-row-btn';
      addBtn.textContent = '+ Ajouter un choix';
      addBtn.addEventListener('click', () => container.appendChild(buildChoiceRow('', false, multiple)));

      qFields.append(container, addBtn);

    } else if(type === 'texte_libre'){
      const container = document.createElement('div');
      container.id = 'answers-container';

      const reponses = data.reponses && data.reponses.length ? data.reponses : [''];
      reponses.forEach(r => container.appendChild(buildAnswerRow(r)));

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'add-row-btn';
      addBtn.textContent = '+ Ajouter une réponse acceptée';
      addBtn.addEventListener('click', () => container.appendChild(buildAnswerRow('')));

      const csRow = document.createElement('label');
      csRow.className = 'case-sensitive-row';
      const csInput = document.createElement('input');
      csInput.type = 'checkbox';
      csInput.id = 'case-sensitive-checkbox';
      csInput.checked = !!data.caseSensitive;
      csRow.append(csInput, document.createTextNode('Sensible à la casse'));

      qFields.append(container, addBtn, csRow);

    } else if(type === 'texte_a_trous'){
      const modeLabel = document.createElement('label');
      modeLabel.textContent = 'Mode de réponse';
      const modeSelect = document.createElement('select');
      modeSelect.id = 'trou-mode';
      modeSelect.innerHTML = `
        <option value="libre">Champs à remplir</option>
        <option value="menu_deroulant">Menus déroulants</option>
      `;
      modeSelect.value = data.mode || 'libre';
      modeLabel.appendChild(modeSelect);

      const poolLabel = document.createElement('label');
      poolLabel.className = 'pool-toggle-label';
      poolLabel.hidden = modeSelect.value !== 'menu_deroulant';
      const poolCheckbox = document.createElement('input');
      poolCheckbox.type = 'checkbox';
      poolCheckbox.id = 'trou-pool-partage';
      poolCheckbox.checked = !!data.poolPartage;
      poolLabel.append(poolCheckbox, document.createTextNode('Tous les trous partagent la même liste d\'options'));

      const poolContainer = document.createElement('div');
      poolContainer.id = 'pool-container';
      const poolOptions = data.options && data.options.length ? data.options : ['', ''];
      poolOptions.forEach(o => poolContainer.appendChild(buildPoolOptionRow(o)));

      const poolAddBtn = document.createElement('button');
      poolAddBtn.type = 'button';
      poolAddBtn.id = 'pool-add-btn';
      poolAddBtn.className = 'add-row-btn';
      poolAddBtn.textContent = '+ Ajouter une option au pool';
      poolAddBtn.addEventListener('click', () => { poolContainer.appendChild(buildPoolOptionRow('')); refreshPoolSelects(); });

      const poolShown = modeSelect.value === 'menu_deroulant' && poolCheckbox.checked;
      poolContainer.hidden = !poolShown;
      poolAddBtn.hidden = !poolShown;

      const texteLabel = document.createElement('label');
      texteLabel.textContent = 'Texte (utilisez {{1}}, {{2}}, ... pour les trous)';
      const texteArea = document.createElement('textarea');
      texteArea.id = 'trou-texte';
      texteArea.rows = 3;
      texteArea.placeholder = 'Le {{1}} est la capitale de la {{2}}.';
      texteArea.value = data.texte || '';
      texteLabel.appendChild(texteArea);

      const trousContainer = document.createElement('div');
      trousContainer.id = 'trous-container';

      qFields.append(modeLabel, poolLabel, poolContainer, poolAddBtn, texteLabel, trousContainer);

      // amorce initiale à partir des données existantes (cas édition)
      const initialIds = extractTrouIds(texteArea.value);
      const poolPartage = modeSelect.value === 'menu_deroulant' && poolCheckbox.checked;
      if(initialIds.length === 0){
        const hint = document.createElement('p');
        hint.className = 'trou-hint';
        hint.textContent = 'Ajoutez {{1}}, {{2}}, ... dans le texte ci-dessus pour créer des trous.';
        trousContainer.appendChild(hint);
      } else {
        initialIds.forEach(id => {
          const existing = (data.trous || []).find(t => Number(t.id) === id);
          trousContainer.appendChild(buildTrouRow(id, modeSelect.value, poolPartage, existing));
        });
      }
      lastTrouMode = modeSelect.value;
      lastTrouPoolPartage = poolPartage;
      refreshPoolSelects();

      texteArea.addEventListener('input', () => syncTrousContainer(true));
      modeSelect.addEventListener('change', () => {
        poolLabel.hidden = modeSelect.value !== 'menu_deroulant';
        const shown = modeSelect.value === 'menu_deroulant' && poolCheckbox.checked;
        poolContainer.hidden = !shown;
        poolAddBtn.hidden = !shown;
        syncTrousContainer(false);
      });
      poolCheckbox.addEventListener('change', () => {
        const shown = modeSelect.value === 'menu_deroulant' && poolCheckbox.checked;
        poolContainer.hidden = !shown;
        poolAddBtn.hidden = !shown;
        syncTrousContainer(false);
      });

    } else if(type === 'ordre'){
      const hint = document.createElement('p');
      hint.className = 'trou-hint';
      hint.textContent = 'L\'ordre ci-dessous (de haut en bas) est l\'ordre correct attendu.';

      const container = document.createElement('div');
      container.id = 'order-container';

      const elements = data.elements && data.elements.length ? data.elements : ['', ''];
      elements.forEach(el => container.appendChild(buildOrderRow(el)));

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'add-row-btn';
      addBtn.textContent = '+ Ajouter un élément';
      addBtn.addEventListener('click', () => container.appendChild(buildOrderRow('')));

      qFields.append(hint, container, addBtn);
    }
  }

  qTypeSelect.addEventListener('change', () => renderQFields(qTypeSelect.value, {}));
  renderQFields(qTypeSelect.value, {});

  /* ---------------------------------------------------------------
     LECTURE DES DONNEES DU FORMULAIRE
  --------------------------------------------------------------- */
  function gatherFormData(type){
    if(type === 'qcm_simple' || type === 'qcm_multiple'){
      const rows = [...qFields.querySelectorAll('.choice-row')];
      const choix = rows.map(r => r.querySelector('.choice-text').value.trim());
      const validRows = rows.map((r, i) => ({ i, empty: choix[i] === '' }));

      if(choix.filter(c => c !== '').length < 2){
        alert('Merci de saisir au moins 2 choix.');
        return null;
      }

      if(type === 'qcm_simple'){
        const idx = rows.findIndex(r => r.querySelector('.choice-correct').checked);
        if(idx === -1){
          alert('Merci de sélectionner la bonne réponse.');
          return null;
        }
        return { choix, reponse: idx };
      } else {
        const reponses = rows
          .map((r, i) => r.querySelector('.choice-correct').checked ? i : null)
          .filter(i => i !== null);
        if(reponses.length === 0){
          alert('Merci de sélectionner au moins une bonne réponse.');
          return null;
        }
        return { choix, reponses };
      }
    }

    if(type === 'texte_libre'){
      const rows = [...qFields.querySelectorAll('.answer-row')];
      const reponses = rows.map(r => r.querySelector('.answer-text').value.trim()).filter(v => v !== '');
      if(reponses.length === 0){
        alert('Merci de saisir au moins une réponse acceptée.');
        return null;
      }
      const caseSensitive = document.getElementById('case-sensitive-checkbox').checked;
      return { reponses, caseSensitive };
    }

    if(type === 'texte_a_trous'){
      const texte = document.getElementById('trou-texte').value.trim();
      const mode = document.getElementById('trou-mode').value;
      const poolCheckbox = document.getElementById('trou-pool-partage');
      const poolPartage = mode === 'menu_deroulant' && !!(poolCheckbox && poolCheckbox.checked);

      if(texte === ''){
        alert('Merci de saisir le texte à trous.');
        return null;
      }
      const ids = extractTrouIds(texte);
      if(ids.length === 0){
        alert('Le texte doit contenir au moins un trou, ex : {{1}}.');
        return null;
      }

      let sharedOptions = null;
      if(poolPartage){
        sharedOptions = getCurrentPoolOptions();
        if(sharedOptions.length < 2){
          alert('Merci de renseigner au moins 2 options dans le pool partagé.');
          return null;
        }
      }

      const rows = [...document.querySelectorAll('#trous-container .trou-row')];
      const trous = [];
      for(const row of rows){
        const id = Number(row.dataset.id);
        const vals = readTrouRowValues(row, mode, poolPartage);
        if(mode === 'libre'){
          if(vals.reponses.length === 0){
            alert(`Merci de renseigner au moins une réponse pour le trou {{${id}}}.`);
            return null;
          }
          trous.push({ id, reponses: vals.reponses, caseSensitive: vals.caseSensitive });
        } else if(poolPartage){
          if(!vals.reponse){
            alert(`Merci de choisir la bonne réponse pour le trou {{${id}}}.`);
            return null;
          }
          trous.push({ id, reponse: vals.reponse });
        } else {
          if(vals.options.length < 2){
            alert(`Merci de renseigner au moins 2 options pour le trou {{${id}}}.`);
            return null;
          }
          if(!vals.reponse){
            alert(`Merci de sélectionner la bonne réponse pour le trou {{${id}}}.`);
            return null;
          }
          trous.push({ id, options: vals.options, reponse: vals.reponse });
        }
      }

      const result = { mode, texte, trous };
      if(poolPartage){
        result.poolPartage = true;
        result.options = sharedOptions;
      }
      return result;
    }

    if(type === 'ordre'){
      const rows = [...document.querySelectorAll('#order-container .order-row')];
      const elements = rows.map(r => r.querySelector('.order-text').value.trim()).filter(v => v !== '');
      if(elements.length < 2){
        alert('Merci de saisir au moins 2 éléments à ordonner.');
        return null;
      }
      return { elements };
    }

    return null;
  }

  exportBtn.addEventListener('click', async () => {
    let filename = exportFilenameInput.value.trim() || 'questions.json';
    if(!filename.toLowerCase().endsWith('.json')) filename += '.json';

    const jsonText = JSON.stringify(buildExportPayload(), null, 2);

    // Navigateurs compatibles (Chrome/Edge) : vraie boîte de dialogue système
    // "Enregistrer sous" permettant de choisir l'emplacement.
    if(window.showSaveFilePicker){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: 'Fichier JSON', accept: { 'application/json': ['.json'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(jsonText);
        await writable.close();
        return;
      } catch(err){
        if(err.name === 'AbortError') return; // annulé par l'utilisateur, on ne fait rien
        // sinon on retente avec la méthode de repli ci-dessous
      }
    }

    // Repli (Firefox, Safari, ...) : téléchargement classique vers le dossier par défaut.
    const blob = new Blob([jsonText], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();

  });

  /* ---------------------------------------------------------------
     MODE LANCER — PREPARATION DU QUIZ
  --------------------------------------------------------------- */
  function buildRuntimeQuestion(q, runtimeId, rng){
    let rq;

    if(q.type === 'texte_libre'){
      rq = { runtimeId, question: q.question, type: q.type, data: q.data };
    } else if(q.type === 'texte_a_trous'){
      let trous = q.data.trous;
      let sharedOptions = null;
      if(q.data.poolPartage){
        sharedOptions = shuffle(q.data.options, rng);
      } else if(q.data.mode === 'menu_deroulant'){
        trous = trous.map(t => ({ ...t, options: shuffle(t.options, rng) }));
      }
      rq = {
        runtimeId, question: q.question, type: q.type,
        data: { mode: q.data.mode, texte: q.data.texte, trous, poolPartage: !!q.data.poolPartage, options: sharedOptions }
      };
    } else if(q.type === 'ordre'){
      const correctOrder = q.data.elements;
      let currentOrder = shuffle(correctOrder, rng);
      let attempts = 0;
      // évite (dans la mesure du possible) de retomber sur l'ordre déjà correct
      while(correctOrder.length > 1 && JSON.stringify(currentOrder) === JSON.stringify(correctOrder) && attempts < 5){
        currentOrder = shuffle(currentOrder, rng);
        attempts++;
      }
      rq = { runtimeId, question: q.question, type: q.type, correctOrder, currentOrder };
    } else {
      const correctSet = q.type === 'qcm_simple' ? new Set([q.data.reponse]) : new Set(q.data.reponses);
      const choices = shuffle(q.data.choix.map((text, i) => ({ text, correct: correctSet.has(i) })), rng);
      rq = { runtimeId, question: q.question, type: q.type, choices };
    }

    rq.explication = q.explication || '';
    return rq;
  }

  function renderTrouText(rq){
    const regex = /\{\{(\d+)\}\}/g;
    const texte = rq.data.texte;
    let lastIndex = 0;
    let html = '';
    let m;
    while((m = regex.exec(texte)) !== null){
      html += escapeHtml(texte.slice(lastIndex, m.index));
      const id = m[1];
      const trou = rq.data.trous.find(t => String(t.id) === id);
      if(rq.data.mode === 'libre'){
        html += `<input type="text" class="trou-input" data-trou-id="${id}">`;
      } else {
        const optionsList = rq.data.poolPartage ? rq.data.options : trou.options;
        const optionsHtml = ['<option value="">—</option>']
          .concat(optionsList.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`))
          .join('');
        html += `<select class="trou-input" data-trou-id="${id}">${optionsHtml}</select>`;
      }
      lastIndex = regex.lastIndex;
    }
    html += escapeHtml(texte.slice(lastIndex));
    return html;
  }

  function startQuiz(){
    if(questions.length === 0){
      alert('Ajoutez ou chargez des questions avant de lancer le quiz.');
      return;
    }

    const total = questions.length;
    let count = parseInt(quizCountInput.value, 10);
    if(isNaN(count) || count <= 0 || count > total) count = total;

    let seed = parseInt(quizSeedInput.value, 10);
    if(isNaN(seed)){
      seed = Math.floor(Math.random() * 1000000000);
      quizSeedInput.value = seed;
    }
    currentSeed = seed;
    const rng = createRng(seed);

    // on associe à chaque question tirée son index d'origine dans `questions`,
    // nécessaire pour incrémenter les bonnes stats une fois le quiz validé
    const indexed = questions.map((q, idx) => ({ q, idx }));
    const pool = shuffle(indexed, rng).slice(0, count);
    runtimeQuestions = pool.map((item, i) => {
      const rq = buildRuntimeQuestion(item.q, i, rng);
      rq.originalIndex = item.idx;
      return rq;
    });
    quizStartTime = Date.now();

    quizSeedDisplay.textContent = `Seed : ${currentSeed}`;
    quizActiveBar.hidden = false;

    quizQuestions.innerHTML = '';
    runtimeQuestions.forEach((rq, i) => {
      const block = document.createElement('div');
      block.className = 'quiz-question';
      block.dataset.id = rq.runtimeId;

      let inputsHtml = '';
      if(rq.type === 'qcm_simple'){
        inputsHtml = rq.choices.map((c, ci) => `
          <label class="quiz-option">
            <input type="radio" name="q${rq.runtimeId}" value="${ci}">
            ${escapeHtml(c.text)}
          </label>
        `).join('');
      } else if(rq.type === 'qcm_multiple'){
        inputsHtml = rq.choices.map((c, ci) => `
          <label class="quiz-option">
            <input type="checkbox" name="q${rq.runtimeId}" value="${ci}">
            ${escapeHtml(c.text)}
          </label>
        `).join('');
      } else if(rq.type === 'texte_a_trous'){
        inputsHtml = `<p class="trou-render">${renderTrouText(rq)}</p>`;
      } else if(rq.type === 'ordre'){
        inputsHtml = `<ul class="order-list">` + rq.currentOrder.map(el => `
          <li class="order-item">
            <span class="order-item-text">${escapeHtml(el)}</span>
            <span class="order-controls">
              <button type="button" class="order-up" title="Monter">▲</button>
              <button type="button" class="order-down" title="Descendre">▼</button>
            </span>
          </li>
        `).join('') + '</ul>';
      } else {
        inputsHtml = `<input type="text" name="q${rq.runtimeId}" placeholder="Votre réponse">`;
      }

      block.innerHTML = `
        <p class="q-number">Question ${i + 1} / ${runtimeQuestions.length}</p>
        <p class="q-text">${escapeHtml(rq.question)}</p>
        ${inputsHtml}
      `;
      quizQuestions.appendChild(block);
    });

    playIntro.hidden = true;
    quizResult.hidden = true;
    quizForm.hidden = false;
    validateBtn.hidden = false;
    validateBtn.textContent = 'Valider';
  }

  startQuizBtn.addEventListener('click', startQuiz);

  seedRandomBtn.addEventListener('click', () => {

  // Réordonnancement (boutons haut/bas) dans la liste à ordonner du quiz
  quizQuestions.addEventListener('click', (e) => {
    const upBtn = e.target.closest('.order-up');
    const downBtn = e.target.closest('.order-down');
    if(!upBtn && !downBtn) return;
    const li = e.target.closest('.order-item');
    if(upBtn){
      const prev = li.previousElementSibling;
      if(prev) li.parentNode.insertBefore(li, prev);
    } else {
      const next = li.nextElementSibling;
      if(next) li.parentNode.insertBefore(next, li);
    }

  /* ---------------------------------------------------------------
     MODE LANCER — VALIDATION
  --------------------------------------------------------------- */
  quizForm.addEventListener('submit', (e) => {
    e.preventDefault();

    let score = 0;

    runtimeQuestions.forEach(rq => {
      const block = quizQuestions.querySelector(`.quiz-question[data-id="${rq.runtimeId}"]`);
      let isCorrect = false;
      let correctText = '';

      if(rq.type === 'texte_libre'){
        const input = block.querySelector('input[type="text"]');
        const val = input.value.trim();
        const cs = rq.data.caseSensitive;
        isCorrect = rq.data.reponses.some(r => cs ? r === val : r.toLowerCase() === val.toLowerCase());
        correctText = rq.data.reponses.join(' / ');
        input.disabled = true;

      } else if(rq.type === 'qcm_simple'){
        const checked = block.querySelector('input[type="radio"]:checked');
        const selected = checked ? Number(checked.value) : null;
        isCorrect = selected !== null && rq.choices[selected].correct;
        correctText = rq.choices.filter(c => c.correct).map(c => c.text).join(', ');
        block.querySelectorAll('input').forEach(i => i.disabled = true);

      } else if(rq.type === 'qcm_multiple'){
        const checked = [...block.querySelectorAll('input[type="checkbox"]:checked')].map(i => Number(i.value));
        const correctIdx = rq.choices.map((c, i) => c.correct ? i : null).filter(i => i !== null);
        isCorrect = checked.length === correctIdx.length && checked.every(i => correctIdx.includes(i));
        correctText = rq.choices.filter(c => c.correct).map(c => c.text).join(', ');
        block.querySelectorAll('input').forEach(i => i.disabled = true);

      } else if(rq.type === 'texte_a_trous'){
        let allCorrect = true;
        const expectedParts = [];
        rq.data.trous.forEach(t => {
          const el = block.querySelector(`.trou-input[data-trou-id="${t.id}"]`);
          const val = el.value.trim();
          let ok;
          if(rq.data.mode === 'libre'){
            ok = t.reponses.some(r => t.caseSensitive ? r === val : r.toLowerCase() === val.toLowerCase());
            expectedParts.push(`{{${t.id}}} : ${t.reponses.join(' / ')}`);
          } else {
            ok = val === t.reponse;
            expectedParts.push(`{{${t.id}}} : ${t.reponse}`);
          }
          if(!ok) allCorrect = false;
          el.disabled = true;
        });
        isCorrect = allCorrect;
        correctText = expectedParts.join(' ; ');

      } else if(rq.type === 'ordre'){
        const items = [...block.querySelectorAll('.order-item-text')].map(s => s.textContent);
        isCorrect = JSON.stringify(items) === JSON.stringify(rq.correctOrder);
        correctText = rq.correctOrder.join(' → ');
        block.querySelectorAll('.order-controls button').forEach(b => b.disabled = true);
      }

      if(isCorrect) score++;
      block.classList.add(isCorrect ? 'is-correct' : 'is-incorrect');

      if(questionStats[rq.originalIndex]){
        questionStats[rq.originalIndex].passages++;
        if(isCorrect) questionStats[rq.originalIndex].reussites++;
      }

      const feedback = document.createElement('p');
      feedback.className = 'feedback';
      feedback.textContent = isCorrect ? '✓ Correct' : `✕ Incorrect — réponse attendue : ${correctText}`;
      block.appendChild(feedback);

      if(rq.explication){
        const expl = document.createElement('p');
        expl.className = 'explanation';
        expl.textContent = `💬 ${rq.explication}`;
        block.appendChild(expl);
      }
    });

    const total = runtimeQuestions.length;
    const pct = Math.round((score / total) * 100);
    const elapsedMs = quizStartTime ? Date.now() - quizStartTime : 0;
    quizResult.innerHTML = `
      <div class="score-banner">
        <div class="score-num">${score} / ${total}</div>
        <div>${pct}% de bonnes réponses</div>
        <div class="time-info">⏱ Temps : ${formatDuration(elapsedMs)} · Seed : ${currentSeed}</div>
      </div>
    `;
    quizResult.hidden = false;
    validateBtn.hidden = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });

    quizRuns.unshift({ score, total, seed: currentSeed, tempsMs: elapsedMs, obsolete: false });
  });

  /* ---------------------------------------------------------------
     ONGLET SCORE
  --------------------------------------------------------------- */

  // Dégradé rouge -> vert selon le taux de réussite (0 à 1).
  // Interpole dans l'espace RGB entre --incorrect et --correct.
  function scoreColor(ratio){
    const from = { r: 220, g: 38, b: 38 };   // rouge (#dc2626)
    const to   = { r: 22,  g: 163, b: 74 };  // vert  (#16a34a)
    const r = Math.round(from.r + (to.r - from.r) * ratio);
    const g = Math.round(from.g + (to.g - from.g) * ratio);
    const b = Math.round(from.b + (to.b - from.b) * ratio);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function renderScoreTab(){
    // --- colonne de gauche : une bulle par question ---
    scoreQuestionsBubbles.innerHTML = '';
    scoreQuestionsEmpty.hidden = questions.length > 0;

    questions.forEach((q, idx) => {
      const stat = questionStats[idx] || { reussites: 0, passages: 0, obsolete: false };
      const bubble = document.createElement('div');
      bubble.className = 'score-bubble';
      bubble.title = q.question.length > 60 ? q.question.slice(0, 60) + '…' : q.question;

      if(stat.obsolete) bubble.classList.add('is-obsolete');

      if(stat.passages === 0){
        bubble.classList.add('is-untested');
        bubble.style.background = '';
      } else {
        const ratio = stat.reussites / stat.passages;
        bubble.style.background = scoreColor(ratio);
        bubble.style.color = '#fff';
        bubble.style.borderColor = 'transparent';
      }

      bubble.innerHTML = `<span class="bubble-num">Q${idx + 1}</span><span>${stat.reussites}/${stat.passages}</span>`;
      bubble.addEventListener('click', () => {
        showView('edit');
        const card = questionsList.children[idx];
        if(card){
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.classList.add('is-highlighted');
          setTimeout(() => card.classList.remove('is-highlighted'), 1500);
        }
      });
      scoreQuestionsBubbles.appendChild(bubble);
    });

    // --- colonne de droite : historique des runs, plus récent en haut ---
    scoreRunsList.innerHTML = '';
    scoreRunsEmpty.hidden = quizRuns.length > 0;

    quizRuns.forEach(run => {
      const item = document.createElement('div');
      item.className = 'run-bubble' + (run.obsolete ? ' is-obsolete' : '');
      item.innerHTML = `
        <span class="run-score">${run.score} / ${run.total}</span>
        <span class="run-meta">Seed ${run.seed}<br>${formatDuration(run.tempsMs)}</span>
      `;
      scoreRunsList.appendChild(item);
    });
  }

  /* ---------------------------------------------------------------
     EDITEUR JSON
  --------------------------------------------------------------- */
  function buildExportPayload(){
    return { questions };
  }

  function refreshJsonEditor(){
    jsonEditor.value = JSON.stringify(buildExportPayload(), null, 2);
    jsonError.hidden = true;
    autoResizeTextarea(jsonEditor);
  }

  jsonRefreshBtn.addEventListener('click', refreshJsonEditor);

  jsonApplyBtn.addEventListener('click', () => {
    jsonError.hidden = true;
    let parsed;
    try{
      parsed = JSON.parse(jsonEditor.value);
    } catch(e){
      jsonError.textContent = 'JSON invalide : ' + e.message;
      jsonError.hidden = false;
      return;
    }
    if(!parsed || !Array.isArray(parsed.questions)){
      jsonError.textContent = 'Format invalide : le JSON doit contenir un champ "questions" (tableau).';
      jsonError.hidden = false;
      return;
    }
    questions = parsed.questions;
    resetForm();
    renderQuestionsList();
    jsonError.hidden = true;
    // feedback visuel bref
    jsonApplyBtn.textContent = '✓ Appliqué';
    setTimeout(() => { jsonApplyBtn.textContent = 'Appliquer'; }, 1400);
  });

  /* ---------------------------------------------------------------
     INITIALISATION
  --------------------------------------------------------------- */
  renderQuestionsList();
  autoResizeTextarea(qTextInput);
  autoResizeTextarea(qExplanationInput);

})();
</script>
</body>
</html>
